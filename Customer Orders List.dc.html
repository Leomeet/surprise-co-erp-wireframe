<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f5f5f5; }
    html, body { height: 100%; }
  </style>
</helmet>

<!-- Navigation Bar -->
<nav style="background: #fff; border-bottom: 1px solid #ccc; padding: 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 2px rgba(0,0,0,.05)">
  <div style="display: flex; align-items: center; height: 56px; padding: 0 24px; gap: 24px">
    <!-- Logo/Title -->
    <div style="font-size: 16px; font-weight: 700; color: #1a1a1a; min-width: 180px">ERP System</div>
    
    <!-- Menu Items -->
    <div style="display: flex; gap: 0; flex: 1">
      <a href="#" style="padding: 16px 16px; font-size: 13px; font-weight: 600; color: #666; text-decoration: none; border-bottom: 3px solid transparent; border-bottom-color: #2563eb; color: #2563eb; cursor: pointer">Orders</a>
      <a href="#" style="padding: 16px 16px; font-size: 13px; font-weight: 600; color: #666; text-decoration: none; border-bottom: 3px solid transparent; cursor: pointer">Quotations</a>
      <a href="#" style="padding: 16px 16px; font-size: 13px; font-weight: 600; color: #666; text-decoration: none; border-bottom: 3px solid transparent; cursor: pointer">Purchase Orders</a>
      <a href="#" style="padding: 16px 16px; font-size: 13px; font-weight: 600; color: #666; text-decoration: none; border-bottom: 3px solid transparent; cursor: pointer">Inventory</a>
      <a href="#" style="padding: 16px 16px; font-size: 13px; font-weight: 600; color: #666; text-decoration: none; border-bottom: 3px solid transparent; cursor: pointer">Tracking</a>
    </div>
    
    <!-- User Menu -->
    <div style="display: flex; align-items: center; gap: 12px">
      <div style="width: 32px; height: 32px; background: #2563eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 600">JD</div>
      <div style="font-size: 12px; color: #666">John Doe</div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div style="display: flex; height: calc(100vh - 56px)">
  <!-- Sidebar Filter -->
  <div style="width: 240px; border-right: 1px solid #ccc; background: #fff; overflow-y: auto; padding: 20px">
    <div style="font-size: 12px; font-weight: 700; color: #333; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px">Filters</div>
    
    <div style="margin-bottom: 20px">
      <div style="font-size: 11px; font-weight: 600; color: #666; margin-bottom: 8px">Status</div>
      <div style="display: flex; flex-direction: column; gap: 6px">
        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: #333; cursor: pointer">
          <input type="checkbox" checked style="cursor: pointer"> All Orders
        </label>
        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: #333; cursor: pointer">
          <input type="checkbox" checked style="cursor: pointer"> Confirmed
        </label>
        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: #333; cursor: pointer">
          <input type="checkbox" checked style="cursor: pointer"> Processing
        </label>
        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: #333; cursor: pointer">
          <input type="checkbox" style="cursor: pointer"> Shipped
        </label>
        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: #333; cursor: pointer">
          <input type="checkbox" style="cursor: pointer"> Delivered
        </label>
      </div>
    </div>
    
    <div style="margin-bottom: 20px">
      <div style="font-size: 11px; font-weight: 600; color: #666; margin-bottom: 8px">Order Type</div>
      <div style="display: flex; flex-direction: column; gap: 6px">
        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: #333; cursor: pointer">
          <input type="checkbox" checked style="cursor: pointer"> Complete
        </label>
        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: #333; cursor: pointer">
          <input type="checkbox" checked style="cursor: pointer"> Partial
        </label>
        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: #333; cursor: pointer">
          <input type="checkbox" checked style="cursor: pointer"> Backorder
        </label>
      </div>
    </div>
    
    <div>
      <div style="font-size: 11px; font-weight: 600; color: #666; margin-bottom: 8px">Payment Status</div>
      <div style="display: flex; flex-direction: column; gap: 6px">
        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: #333; cursor: pointer">
          <input type="checkbox" checked style="cursor: pointer"> Paid
        </label>
        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: #333; cursor: pointer">
          <input type="checkbox" checked style="cursor: pointer"> Pending
        </label>
        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: #333; cursor: pointer">
          <input type="checkbox" style="cursor: pointer"> Overdue
        </label>
      </div>
    </div>
  </div>
  
  <!-- Main Content Area -->
  <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden">
    <!-- Header -->
    <div style="background: #fff; border-bottom: 1px solid #ccc; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center">
      <div>
        <div style="font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px">Customer Orders</div>
        <div style="font-size: 12px; color: #666">View and manage all customer quotation orders</div>
      </div
</x-dc>
</body>
</html>
