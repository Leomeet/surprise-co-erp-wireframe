<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f5f5f5; color: #333; }
    .wireframe-box { background: #fff; border: 1px solid #ccc; padding: 12px; margin-bottom: 8px; border-radius: 2px; }
    .wireframe-text { background: #eee; height: 16px; margin-bottom: 8px; border-radius: 2px; }
    .wireframe-text.small { height: 12px; }
  </style>
</helmet>

<div style="display: flex; flex-direction: column; height: 100vh; background: #f5f5f5">
  
  <!-- Header -->
  <div style="background: #fff; border-bottom: 1px solid #ccc; padding: 16px 24px">
    <sc-if value="{{ showText }}" hint-placeholder-val="{{ true }}">
      <div style="font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px">{{ headerTitle }}</div>
      <div style="font-size: 12px; color: #666">{{ headerSubtitle }}</div>
    </sc-if>
    <sc-if value="{{ !showText }}" hint-placeholder-val="{{ false }}">
      <div style="background: #ddd; height: 24px; width: 200px; border-radius: 2px; margin-bottom: 8px"></div>
      <div style="background: #eee; height: 14px; width: 300px; border-radius: 2px"></div>
    </sc-if>
  </div>

  <!-- Main Content -->
  <div style="flex: 1; display: flex; overflow: hidden">
    
    <!-- LEFT PANEL: Upload & Metadata -->
    <div style="width: 35%; background: #fff; border-right: 1px solid #ccc; display: flex; flex-direction: column; overflow: hidden">
      
      <!-- Upload Section -->
      <div style="padding: 16px; border-bottom: 1px solid #ccc">
        <sc-if value="{{ showText }}" hint-placeholder-val="{{ true }}">
          <div style="font-size: 12px; font-weight: 600; color: #333; margin-bottom: 12px">{{ uploadLabel }}</div>
        </sc-if>
        <sc-if value="{{ !showText }}" hint-placeholder-val="{{ false }}">
          <div style="background: #ddd; height: 14px; width: 100px; border-radius: 2px; margin-bottom: 12px"></div>
        </sc-if>
        <div style="border: 2px dashed #999; border-radius: 4px; padding: 20px; text-align: center; background: #f9f9f9; height: 80px; display: flex; align-items: center; justify-content: center">
          <div style="background: #ddd; height: 40px; width: 60px; border-radius: 2px"></div>
        </div>
      </div>

      <!-- Order Metadata Form -->
      <div style="flex: 1; overflow-y: auto; padding: 16px; border-bottom: 1px solid #ccc">
        <sc-if value="{{ showText }}" hint-placeholder-val="{{ true }}">
          <div style="font-size: 12px; font-weight: 600; color: #333; margin-bottom: 12px">{{ orderFormTitle }}</div>
        </sc-if>
        <sc-if value="{{ !showText }}" hint-placeholder-val="{{ false }}">
          <div style="background: #ddd; height: 14px; width: 120px; border-radius: 2px; margin-bottom: 12px"></div>
        </sc-if>
        
        <!-- Form Fields -->
        <div style="margin-bottom: 12px">
          <div style="background: #eee; height: 12px; width: 80px; border-radius: 2px; margin-bottom: 6px"></div>
          <div style="background: #f5f5f5; height: 32px; border: 1px solid #ccc; border-radius: 2px"></div>
        </div>
        
        <div style="margin-bottom: 12px">
          <div style="background: #eee; height: 12px; width: 100px; border-radius: 2px; margin-bottom: 6px"></div>
          <div style="background: #f5f5f5; height: 32px; border: 1px solid #ccc; border-radius: 2px"></div>
        </div>

        <div style="margin-bottom: 12px">
          <div style="background: #eee; height: 12px; width: 90px; border-radius: 2px; margin-bottom: 6px"></div>
          <div style="display: flex; gap: 6px">
            <div style="flex: 1; background: #f5f5f5; height: 32px; border: 1px solid #ccc; border-radius: 2px"></div>
            <div style="flex: 1; background: #f5f5f5; height: 32px; border: 1px solid #ccc; border-radius: 2px"></div>
          </div>
        </div>

        <div style="margin-bottom: 12px">
          <div style="background: #eee; height: 12px; width: 110px; border-radius: 2px; margin-bottom: 6px"></div>
          <div style="background: #f5f5f5; height: 32px; border: 1px solid #ccc; border-radius: 2px"></div>
        </div>

        <div>
          <div style="background: #eee; height: 12px; width: 50px; border-radius: 2px; margin-bottom: 6px"></div>
          <div style="background: #f5f5f5; height: 60px; border: 1px solid #ccc; border-radius: 2px"></div>
        </div>
      </div>

      <!-- Summary Stats -->
      <div style="padding: 12px; background: #f9f9f9; border-top: 1px solid #ccc; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px">
        <div style="padding: 8px; background: #fff; border: 1px solid #ccc; border-radius: 2px; text-align: center">
          <sc-if value="{{ showText }}" hint-placeholder-val="{{ true }}">
            <div style="font-size: 10px; color: #666; font-weight: 600; margin-bottom: 4px">{{ statLabel1 }}</div>
            <div style="font-size: 14px; font-weight: 700; color: #2563eb">24</div>
          </sc-if>
          <sc-if value="{{ !showText }}" hint-placeholder-val="{{ false }}">
            <div style="background: #eee; height: 12px; border-radius: 2px; margin-bottom: 4px"></div>
            <div style="background: #ddd; height: 16px; border-radius: 2px"></div>
          </sc-if>
        </div>
        <div style="padding: 8px; background: #fff; border: 1px solid #ccc; border-radius: 2px; text-align: center">
          <sc-if value="{{ showText }}" hint-placeholder-val="{{ true }}">
            <div style="font-size: 10px; color: #666; font-weight: 600; margin-bottom: 4px">{{ statLabel2 }}</div>
            <div style="font-size: 14px; font-weight: 700; color: #16a34a">18</div>
          </sc-if>
          <sc-if value="{{ !showText }}" hint-placeholder-val="{{ false }}">
            <div style="background: #eee; height: 12px; border-radius: 2px; margin-bottom: 4px"></div>
            <div style="background: #ddd; height: 16px; border-radius: 2px"></div>
          </sc-if>
        </div>
        <div style="padding: 8px; background: #fff; border: 1px solid #ccc; border-radius: 2px; text-align: center">
          <sc-if value="{{ showText }}" hint-placeholder-val="{{ true }}">
            <div style="font-size: 10px; color: #666; font-weight: 600; margin-bottom: 4px">{{ statLabel3 }}</div>
            <div style="font-size: 14px; font-weight: 700; color: #dc2626">6</div>
          </sc-if>
          <sc-if value="{{ !showText }}" hint-placeholder-val="{{ false }}">
            <div style="background: #eee; height: 12px; border-radius: 2px; margin-bottom: 4px"></div>
            <div style="background: #ddd; height: 16px; border-radius: 2px"></div>
          </sc-if>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL: Items Table -->
    <div style="width: 65%; display: flex; flex-direction: column; overflow: hidden; border-left: 1px solid #ccc">
      
      <!-- Table Header -->
      <div style="padding: 16px 20px; background: #fff; border-bottom: 1px solid #ccc">
        <sc-if value="{{ showText }}" hint-placeholder-val="{{ true }}">
          <div style="font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px">{{ tableTitle }}</div>
          <div style="font-size: 11px; color: #666">{{ tableSubtitle }}</div>
        </sc-if>
        <sc-if value="{{ !showText }}" hint-placeholder-val="{{ false }}">
          <div style="background: #ddd; height: 16px; width: 150px; border-radius: 2px; margin-bottom: 6px"></div>
          <div style="background: #eee; height: 12px; width: 250px; border-radius: 2px"></div>
        </sc-if>
      </div>

      <!-- Table Column Headers -->
      <div style="padding: 12px 20px; background: #f0f0f0; border-bottom: 1px solid #ccc; display: grid; grid-template-columns: 80px 200px 60px 100px 100px 100px 50px; gap: 16px">
        <div style="background: #ddd; height: 12px; border-radius: 2px"></div>
        <div style="background: #ddd; height: 12px; border-radius: 2px"></div>
        <div style="background: #ddd; height: 12px; border-radius: 2px"></div>
        <div style="background: #ddd; height: 12px; border-radius: 2px"></div>
        <div style="background: #ddd; height: 12px; border-radius: 2px"></div>
        <div style="background: #ddd; height: 12px; border-radius: 2px"></div>
        <div style="background: #ddd; height: 12px; border-radius: 2px"></div>
      </div>

      <!-- Table Rows -->
      <div style="flex: 1; overflow-y: auto">
        <!-- Row 1 (white) -->
        <div style="padding: 12px 20px; background: #fff; border-bottom: 1px solid #eee; display: grid; grid-template-columns: 80px 200px 60px 100px 100px 100px 50px; gap: 16px; align-items: center">
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
        </div>

        <!-- Row 2 (light gray) -->
        <div style="padding: 12px 20px; background: #f9f9f9; border-bottom: 1px solid #eee; display: grid; grid-template-columns: 80px 200px 60px 100px 100px 100px 50px; gap: 16px; align-items: center">
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
        </div>

        <!-- Row 3 (white) -->
        <div style="padding: 12px 20px; background: #fff; border-bottom: 1px solid #eee; display: grid; grid-template-columns: 80px 200px 60px 100px 100px 100px 50px; gap: 16px; align-items: center">
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
          <div style="background: #eee; height: 12px; border-radius: 2px"></div>
        </div>
      </div>

      <!-- Action Bar -->
      <div style="background: #fff; border-top: 1px solid #ccc; padding: 12px 20px; display: flex; gap: 10px; justify-content: flex-end">
        <sc-if value="{{ showText }}" hint-placeholder-val="{{ true }}">
          <button style="padding: 8px 16px; border: 1px solid #ccc; border-radius: 2px; background: #f5f5f5; font-size: 12px; font-weight: 600; color: #333; cursor: pointer">{{ buttonCancel }}</button>
          <button style="padding: 8px 16px; border: 1px solid #999; border-radius: 2px; background: #ddd; font-size: 12px; font-weight: 600; color: #333; cursor: pointer">{{ buttonSave }}</button>
        </sc-if>
        <sc-if value="{{ !showText }}" hint-placeholder-val="{{ false }}">
          <div style="width: 100px; height: 32px; background: #f5f5f5; border: 1px solid #ccc; border-radius: 2px"></div>
          <div style="width: 120px; height: 32px; background: #ddd; border: 1px solid #999; border-radius: 2px"></div>
        </sc-if>
      </div>
    </div>

  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100vh&quot;},&quot;showText&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;headerTitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Quotation Management&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;headerSubtitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Upload, edit, and manage quotation items before saving&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;uploadLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Upload Quotation&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;orderFormTitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Order Information&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;statLabel1&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Total Items&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;statLabel2&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Available&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;statLabel3&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;To Order&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tableTitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Quotation Items&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tableSubtitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Edit items below, then save changes&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;buttonCancel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Discard Changes&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;buttonSave&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Save Quotation&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;rowCount&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:3,&quot;min&quot;:1,&quot;max&quot;:10,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {};
  }
}

</script>
</body>
</html>
