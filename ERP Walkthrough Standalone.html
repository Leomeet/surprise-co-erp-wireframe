   { id: 'ORD-2024-0001', name: 'Q1 Stock A', avatar: 'AB', color: '#2563eb' },\n      { id: 'ORD-2024-0002', name: 'Q2 Stock B', avatar: 'JK', color: '#7c3aed' }\n    ]}\n  };\n  \n  function closeArrangeDropdown() {\n    if (arrangeDropdown) arrangeDropdown.remove();\n    arrangeDropdown = null;\n    activeArrangeRow = null;\n  }\n  \n  function openArrangeDropdown(skuId, event) {\n    event.stopPropagation();\n    closeArrangeDropdown();\n    \n    const row = document.querySelector(`[data-arrange-row=\"${skuId}\"]`);\n    const data = arrangeData[skuId];\n    if (!row || !data) return;\n    \n    activeArrangeRow = skuId;\n    \n    // Build dropdown\n    const dd = document.createElement('div');\n    const rect = row.getBoundingClientRect();\n    dd.style.cssText = `\n      position: fixed;\n      top: ${rect.bottom}px;\n      left: ${rect.left}px;\n      background: #fff;\n      border: 1px solid #d1d5db;\n      border-radius: 8px;\n      box-shadow: 0 8px 24px rgba(0,0,0,0.12);\n      z-index: 10000;\n      min-width: 380px;\n      max-width: 450px;\n      max-height: 400px;\n      overflow-y: auto;\n    `;\n    \n    // Tab bar\n    const tabBar = document.createElement('div');\n    tabBar.style.cssText = `\n      display: flex;\n      border-bottom: 1px solid #e5e7eb;\n      background: #fafafa;\n      border-radius: 8px 8px 0 0;\n    `;\n    \n    const tabs = [\n      { id: 'status', label: 'Status', active: true },\n      { id: 'arrange', label: 'Arrange', active: false }\n    ];\n    \n    tabs.forEach(tab => {\n      const tabBtn = document.createElement('button');\n      tabBtn.style.cssText = `\n        flex: 1;\n        padding: 12px;\n        border: none;\n        background: transparent;\n        font-size: 13px;\n        font-weight: 600;\n        color: ${tab.active ? '#2563eb' : '#888'};\n        cursor: pointer;\n        border-bottom: ${tab.active ? '2px solid #2563eb' : '2px solid transparent'};\n        transition: all 0.15s;\n      `;\n      tabBtn.textContent = tab.label;\n      tabBtn.onclick = () => {\n        document.querySelectorAll('[data-dd-tab]').forEach(t => {\n          t.style.display = 'none';\n          t.style.borderBottom = '2px solid transparent';\n          t.style.color = '#888';\n        });\n        document.querySelectorAll(`[data-dd-content=\"${tab.id}\"]`).forEach(c => c.style.display = 'block');\n        tabs.forEach(t => {\n          const btn = tabBar.querySelector(`[data-tab-id=\"${t.id}\"]`);\n          if (t.id === tab.id) {\n            btn.style.color = '#2563eb';\n            btn.style.borderBottom = '2px solid #2563eb';\n          } else {\n            btn.style.color = '#888';\n            btn.style.borderBottom = '2px solid transparent';\n          }\n        });\n      };\n      tabBtn.setAttribute('data-tab-id', tab.id);\n      tabBar.appendChild(tabBtn);\n    });\n    dd.appendChild(tabBar);\n    \n    // Status tab content\n    const statusContent = document.createElement('div');\n    statusContent.setAttribute('data-dd-content', 'status');\n    statusContent.style.cssText = 'padding: 16px; display: block;';\n    statusContent.innerHTML = `\n      <div style=\"font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 12px;\">Item Status<\u002Fdiv>\n      <div style=\"display: grid; gap: 10px;\">\n        <div style=\"padding: 10px; background: #dcfce7; border-radius: 6px; border-left: 3px solid #16a34a;\">\n          <div style=\"font-size: 12px; font-weight: 600; color: #166534;\">Status: Arrangeable<\u002Fdiv>\n          <div style=\"font-size: 11px; color: #16a34a; margin-top: 4px;\">This item is in stock but assigned to another order<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 10px; background: #f5f5f5; border-radius: 6px;\">\n          <div style=\"font-size: 12px; color: #666; margin-bottom: 6px;\"><strong>Current Qty:<\u002Fstrong> 2 units<\u002Fdiv>\n          <div style=\"font-size: 12px; color: #666;\"><strong>Unit Price:<\u002Fstrong> ₹2,500<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n    dd.appendChild(statusContent);\n    \n    // Arrange tab content\n    const arrangeContent = document.createElement('div');\n    arrangeContent.setAttribute('data-dd-content', 'arrange');\n    arrangeContent.style.cssText = 'padding: 16px; display: none;';\n    \n    const arrangeTitle = document.createElement('div');\n    arrangeTitle.style.cssText = 'font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 12px;';\n    arrangeTitle.textContent = 'Select order to arrange from:';\n    arrangeContent.appendChild(arrangeTitle);\n    \n    const list = document.createElement('div');\n    list.style.cssText = 'display: flex; flex-direction: column; gap: 8px;';\n    \n    data.orders.forEach(ord => {\n      const item = document.createElement('div');\n      item.style.cssText = `\n        padding: 12px;\n        border: 2px solid #e5e7eb;\n        border-radius: 6px;\n        cursor: pointer;\n        transition: all 0.15s;\n        display: flex;\n        align-items: center;\n        gap: 12px;\n      `;\n      item.onmouseover = () => item.style.borderColor = '#2563eb';\n      item.onmouseout = () => item.style.borderColor = '#e5e7eb';\n      \n      const avatar = document.createElement('div');\n      avatar.style.cssText = `\n        width: 32px;\n        height: 32px;\n        border-radius: 50%;\n        background: ${ord.color};\n        color: #fff;\n        display: flex;\n        align-items: center;\n        justify-content: center;\n        font-weight: 700;\n        font-size: 12px;\n        flex-shrink: 0;\n      `;\n      avatar.textContent = ord.avatar;\n      \n      const info = document.createElement('div');\n      info.style.cssText = 'flex: 1;';\n      info.innerHTML = `<div style=\"font-size: 13px; font-weight: 600; color: #1a1a1a;\">${ord.name}<\u002Fdiv><div style=\"font-size: 12px; color: #888; margin-top: 2px;\">${ord.id}<\u002Fdiv>`;\n      \n      item.appendChild(avatar);\n      item.appendChild(info);\n      item.onclick = () => confirmArrange(skuId, ord);\n      list.appendChild(item);\n    });\n    arrangeContent.appendChild(list);\n    dd.appendChild(arrangeContent);\n    \n    // Close button\n    const closeBtn = document.createElement('button');\n    closeBtn.style.cssText = `\n      width: calc(100% - 32px);\n      margin: 12px 16px 16px;\n      padding: 8px;\n      border: 1px solid #d1d5db;\n      border-radius: 6px;\n      background: #f5f5f5;\n      font-size: 13px;\n      font-weight: 600;\n      color: #333;\n      cursor: pointer;\n    `;\n    closeBtn.textContent = 'Cancel';\n    closeBtn.onclick = closeArrangeDropdown;\n    dd.appendChild(closeBtn);\n    \n    arrangeDropdown = dd;\n    document.body.appendChild(dd);\n  }\n  \n  function confirmArrange(skuId, order) {\n    // Show confirmation dialog\n    const confirmDialog = document.createElement('div');\n    confirmDialog.style.cssText = `\n      position: fixed;\n      top: 0;\n      left: 0;\n      right: 0;\n      bottom: 0;\n      background: rgba(0,0,0,0.5);\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      z-index: 10001;\n    `;\n    \n    const dialogBox = document.createElement('div');\n    dialogBox.style.cssText = `\n      background: #fff;\n      border-radius: 12px;\n      padding: 24px;\n      max-width: 400px;\n      box-shadow: 0 20px 60px rgba(0,0,0,0.3);\n    `;\n    \n    dialogBox.innerHTML = `\n      <div style=\"font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px;\">Confirm Arrangement<\u002Fdiv>\n      <div style=\"font-size: 14px; color: #666; margin-bottom: 20px;\">\n        Arrange from <strong>${order.name}<\u002Fstrong> (${order.id})?\n      <\u002Fdiv>\n      <div style=\"display: flex; gap: 12px; justify-content: flex-end;\">\n        <button id=\"cancelConfirm\" style=\"padding: 10px 20px; border: 1px solid #d1d5db; border-radius: 8px; background: #f5f5f5; font-size: 14px; font-weight: 600; color: #333; cursor: pointer;\">Cancel<\u002Fbutton>\n        <button id=\"confirmArrange\" style=\"padding: 10px 20px; border: none; border-radius: 8px; background: #2563eb; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;\">Confirm<\u002Fbutton>\n      <\u002Fdiv>\n    `;\n    \n    confirmDialog.appendChild(dialogBox);\n    document.body.appendChild(confirmDialog);\n    \n    document.getElementById('cancelConfirm').onclick = () => {\n      confirmDialog.remove();\n    };\n    \n    document.getElementById('confirmArrange').onclick = () => {\n      confirmDialog.remove();\n      \n      const stub = document.querySelector(`[data-arrange-display=\"${skuId}\"]`);\n      const avatars = document.querySelector(`[data-arrange-avatars=\"${skuId}\"]`);\n      \n      if (stub && avatars) {\n        // Update stub to show order ID prefix + ..\n        const prefix = order.id.split('-')[2]; // e.g. \"0001\"\n        stub.textContent = prefix.slice(0, 2) + '..';\n        stub.style.background = order.color;\n        stub.style.color = '#fff';\n        stub.style.borderColor = order.color;\n        stub.style.borderStyle = 'solid';\n        \n        // Replace avatars with single selected one\n        avatars.innerHTML = `<div class=\"avatar\" style=\"background: ${order.color};\">${order.avatar}<\u002Fdiv>`;\n      }\n      \n      closeArrangeDropdown();\n    };\n  }\n  \n  // Close dropdown on outside click\n  document.addEventListener('click', (e) => {\n    if (arrangeDropdown && !arrangeDropdown.contains(e.target) && !e.target.closest('.arrange-preview')) {\n      closeArrangeDropdown();\n    }\n  });\n\n  // ----- Inventory Management Path A -----\n  const invData = {\n    'SKU-001': { name: 'Electronic Component A', qty: 12, price: 850 },\n    'SKU-002': { name: 'Mechanical Part B', qty: 6, price: 1200 },\n    'SKU-003': { name: 'Assembly Kit C', qty: 2, price: 2500 }\n  };\n  \n  let selectedSku = null;\n  let editQty, editPrice;\n  \n  function renderStep(step) {\n    document.getElementById('invStep1').style.display = step === 1 ? 'block' : 'none';\n    document.getElementById('invStep2').style.display = step === 2 ? 'block' : 'none';\n    document.getElementById('invStep3').style.display = step === 3 ? 'block' : 'none';\n    document.getElementById('invStep4').style.display = step === 4 ? 'block' : 'none';\n    document.getElementById('invStep5').style.display = step === 5 ? 'block' : 'none';\n  }\n  \n  function renderItemSelected() {\n    const data = invData[selectedSku];\n    const total = data.qty * data.price;\n    document.getElementById('invSelectedItem').innerHTML = `\n      <div style=\"padding: 20px; background: #f5f5f5; border-radius: 8px; margin-bottom: 20px;\">\n        <div style=\"font-weight: 600; font-size: 13px; color: #2563eb; margin-bottom: 12px;\">${selectedSku}<\u002Fdiv>\n        <div style=\"font-size: 12px; color: #666; margin-bottom: 16px;\">${data.name}<\u002Fdiv>\n        <div style=\"padding: 12px; background: #fff; border-radius: 6px; border: 1px solid #e5e7eb; margin-bottom: 16px;\">\n          <div style=\"font-size: 11px; font-weight: 600; color: #1a1a1a; margin-bottom: 12px;\">CURRENT STOCK<\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; text-align: center;\">\n            <div><div style=\"font-size: 13px; font-weight: 600; color: #2563eb;\">${data.qty}<\u002Fdiv><div style=\"font-size: 10px; color: #666;\">units<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size: 13px; font-weight: 600;\">₹${data.price}<\u002Fdiv><div style=\"font-size: 10px; color: #666;\">unit price<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size: 13px; font-weight: 600;\">₹${total.toLocaleString()}<\u002Fdiv><div style=\"font-size: 10px; color: #666;\">total value<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"window.invGoToStep(3)\" style=\"width: 100%; padding: 10px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;\">↓ Edit Stock & Price<\u002Fbutton>\n      <\u002Fdiv>\n    `;\n  }\n  \n  function renderItemEditing() {\n    const data = invData[selectedSku];\n    editQty = data.qty;\n    editPrice = data.price;\n    const newTotal = editQty * editPrice;\n    document.getElementById('invEditingItem').innerHTML = `\n      <div style=\"padding: 20px; background: #f5f5f5; border-radius: 8px; margin-bottom: 20px;\">\n        <div style=\"font-weight: 600; font-size: 13px; color: #2563eb; margin-bottom: 12px;\">${selectedSku}<\u002Fdiv>\n        <div style=\"font-size: 12px; color: #666; margin-bottom: 16px;\">${data.name}<\u002Fdiv>\n        <div style=\"padding: 12px; background: #fff; border-radius: 6px; border: 1px solid #e5e7eb; margin-bottom: 16px;\">\n          <div style=\"font-size: 11px; font-weight: 600; color: #1a1a1a; margin-bottom: 12px;\">EDITING STOCK<\u002Fdiv>\n          <div style=\"margin-bottom: 16px;\">\n            <div style=\"font-size: 11px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px;\">Quantity<\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 8px;\">\n              <button onclick=\"window.invDecQty()\" style=\"padding: 6px 12px; border: 1px solid #d1d5db; background: #f5f5f5; border-radius: 4px; cursor: pointer; font-size: 12px;\">−<\u002Fbutton>\n              <input type=\"number\" id=\"invQtyInput\" value=\"${editQty}\" style=\"flex: 1; text-align: center; padding: 6px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 12px;\">\n              <button onclick=\"window.invIncQty()\" style=\"padding: 6px 12px; border: 1px solid #d1d5db; background: #f5f5f5; border-radius: 4px; cursor: pointer; font-size: 12px;\">+<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font-size: 10px; color: #999; margin-top: 6px;\">Before: ${data.qty} units &nbsp;&nbsp; After: <span id=\"invQtyAfter\">${editQty}<\u002Fspan> units<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size: 11px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px;\">Unit Price (₹)<\u002Fdiv>\n            <input type=\"number\" id=\"invPriceInput\" value=\"${editPrice}\" onchange=\"window.invUpdateTotal()\" style=\"width: 100%; padding: 6px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 12px;\">\n            <div style=\"font-size: 10px; color: #999; margin-top: 6px;\">Before: ₹${data.price} &nbsp;&nbsp; After: ₹<span id=\"invPriceAfter\">${editPrice}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 12px;\">\n          <button onclick=\"window.invGoToStep(2)\" style=\"flex: 1; padding: 10px; background: #f5f5f5; border: 1px solid #d1d5db; border-radius: 6px; font-size: 12px; font-weight: 600; color: #333; cursor: pointer;\">← Back<\u002Fbutton>\n          <button onclick=\"window.invGoToStep(4)\" style=\"flex: 1; padding: 10px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;\">↓ Save Changes →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }\n  \n  function renderItemConfirm() {\n    const data = invData[selectedSku];\n    editQty = parseInt(document.getElementById('invQtyInput')?.value) || data.qty;\n    editPrice = parseInt(document.getElementById('invPriceInput')?.value) || data.price;\n    const newTotal = editQty * editPrice;\n    const oldTotal = data.qty * data.price;\n    document.getElementById('invConfirmItem').innerHTML = `\n      <div style=\"padding: 20px; background: #f5f5f5; border-radius: 8px; margin-bottom: 20px;\">\n        <div style=\"font-weight: 600; font-size: 13px; color: #f97316; margin-bottom: 12px;\">${selectedSku}<\u002Fdiv>\n        <div style=\"font-size: 12px; color: #666; margin-bottom: 16px;\">${data.name}<\u002Fdiv>\n        <div style=\"padding: 12px; background: #fff9e6; border-radius: 6px; border: 1px solid #fbbf24; margin-bottom: 16px;\">\n          <div style=\"font-size: 11px; font-weight: 600; color: #92400e; margin-bottom: 12px;\">▲ CHANGE SUMMARY<\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; text-align: center; font-size: 11px; margin-bottom: 12px;\">\n            <div><div style=\"color: #666; margin-bottom: 4px;\">Field<\u002Fdiv><div style=\"font-weight: 600; color: #1a1a1a;\">Before<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"color: #666; margin-bottom: 4px;\">After<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding-bottom: 12px; border-bottom: 1px solid #fbbf24; margin-bottom: 12px;\">\n            <div style=\"font-size: 10px; color: #666; margin-bottom: 8px;\">Quantity<\u002Fdiv>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; text-align: center; font-size: 11px; font-weight: 600;\">\n              <div>${data.qty}<\u002Fdiv>\n              <div>→<\u002Fdiv>\n              <div style=\"color: #f97316;\">${editQty}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding-bottom: 12px; margin-bottom: 12px;\">\n            <div style=\"font-size: 10px; color: #666; margin-bottom: 8px;\">Unit Price<\u002Fdiv>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; text-align: center; font-size: 11px; font-weight: 600;\">\n              <div>₹${data.price}<\u002Fdiv>\n              <div>→<\u002Fdiv>\n              <div style=\"color: #f97316;\">₹${editPrice}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size: 10px; color: #92400e; font-weight: 600;\">New Total: ₹${newTotal.toLocaleString()} (was ₹${oldTotal.toLocaleString()})<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 12px;\">\n          <button onclick=\"window.invGoToStep(3)\" style=\"flex: 1; padding: 10px; background: #f5f5f5; border: 1px solid #d1d5db; border-radius: 6px; font-size: 12px; font-weight: 600; color: #333; cursor: pointer;\">← Back<\u002Fbutton>\n          <button onclick=\"window.invConfirmApply()\" style=\"flex: 1; padding: 10px; background: #16a34a; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;\">✓ Confirm & Apply<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }\n  \n  function renderItemUpdated() {\n    const data = invData[selectedSku];\n    const newTotal = editQty * editPrice;\n    document.getElementById('invUpdatedItem').innerHTML = `\n      <div style=\"padding: 16px; background: #dcfce7; border-radius: 8px; border: 1px solid #16a34a; margin-bottom: 20px;\">\n        <div style=\"font-size: 12px; font-weight: 600; color: #166534; margin-bottom: 12px;\">✓ Stock updated successfully<\u002Fdiv>\n        <div style=\"padding: 12px; background: #fff; border-radius: 6px; border: 1px solid #16a34a;\">\n          <div style=\"font-weight: 600; font-size: 13px; color: #2563eb; margin-bottom: 8px;\">${selectedSku}<\u002Fdiv>\n          <div style=\"font-size: 12px; color: #666; margin-bottom: 12px;\">${data.name}<\u002Fdiv>\n          <div style=\"font-size: 11px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px;\">UPDATED STOCK<\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; text-align: center; margin-bottom: 12px;\">\n            <div><div style=\"font-size: 12px; font-weight: 600; color: #16a34a;\">${editQty}<\u002Fdiv><div style=\"font-size: 10px; color: #666;\">units<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size: 12px; font-weight: 600;\">₹${editPrice}<\u002Fdiv><div style=\"font-size: 10px; color: #666;\">unit price<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size: 12px; font-weight: 600;\">₹${newTotal.toLocaleString()}<\u002Fdiv><div style=\"font-size: 10px; color: #666;\">total value<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"window.invGoToStep(2)\" style=\"width: 100%; padding: 8px; background: transparent; border: 1px solid #16a34a; border-radius: 6px; color: #16a34a; font-size: 11px; font-weight: 600; cursor: pointer;\">↓ Edit Stock & Price<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }\n  \n  window.invGoToStep = (step) => {\n    if (!selectedSku) return;\n    renderStep(step);\n    if (step === 2) renderItemSelected();\n    else if (step === 3) renderItemEditing();\n    else if (step === 4) renderItemConfirm();\n    else if (step === 5) renderItemUpdated();\n  };\n  \n  window.invDecQty = () => {\n    const input = document.getElementById('invQtyInput');\n    let val = parseInt(input.value) || 0;\n    if (val > 1) {\n      input.value = val - 1;\n      document.getElementById('invQtyAfter').textContent = val - 1;\n    }\n  };\n  \n  window.invIncQty = () => {\n    const input = document.getElementById('invQtyInput');\n    let val = parseInt(input.value) || 0;\n    input.value = val + 1;\n    document.getElementById('invQtyAfter').textContent = val + 1;\n  };\n  \n  window.invUpdateTotal = () => {\n    const priceInput = document.getElementById('invPriceInput');\n    document.getElementById('invPriceAfter').textContent = priceInput.value;\n  };\n  \n  window.invConfirmApply = () => {\n    const qtyInput = document.getElementById('invQtyInput');\n    const priceInput = document.getElementById('invPriceInput');\n    editQty = parseInt(qtyInput.value);\n    editPrice = parseInt(priceInput.value);\n    invData[selectedSku].qty = editQty;\n    invData[selectedSku].price = editPrice;\n    window.invGoToStep(5);\n  };\n  \n  // Initialize Step 1\n  renderStep(1);\n  \n  // Item selection\n  document.querySelectorAll('.inv-item').forEach(item => {\n    item.addEventListener('click', () => {\n      document.querySelectorAll('.inv-item').forEach(i => i.style.background = '#fff');\n      item.style.background = '#e0f2fe';\n      selectedSku = item.dataset.sku;\n      window.invGoToStep(2);\n    });\n  });\n\n  // ----- Urgent toggle buttons -----\n  document.querySelectorAll('.urgent-toggle').forEach(btn => {\n    btn.addEventListener('click', () => {\n      const isUrgent = btn.dataset.urgent === 'true';\n      btn.dataset.urgent = !isUrgent;\n      btn.style.background = isUrgent ? 'white' : '#dc2626';\n      btn.style.borderColor = isUrgent ? '#ccc' : '#dc2626';\n    });\n  });\n\n  // ----- Full-screen showcase -----\n  const fsOverlay = document.getElementById('fsOverlay');\n  const fsBody = document.getElementById('fsBody');\n  const fsTitle = document.getElementById('fsTitle');\n  const fsPrev = document.getElementById('fsPrev');\n  const fsNext = document.getElementById('fsNext');\n  let fsReturn = null;\n  let fsApi = null;\n  function mountActiveFrame() {\n    const frame = fsApi.getActiveFrame();\n    fsReturn = { parent: frame.parentNode, next: frame.nextSibling, node: frame };\n    fsBody.appendChild(frame);\n    fsBody.scrollTop = 0;\n    fsTitle.textContent = fsApi.getTitle();\n    fsPrev.disabled = fsApi.getIdx() === 0;\n    fsNext.disabled = fsApi.getIdx() === fsApi.total - 1;\n  }\n  function restoreFrame() {\n    if (!fsReturn) return;\n    if (fsReturn.next) fsReturn.parent.insertBefore(fsReturn.node, fsReturn.next);\n    else fsReturn.parent.appendChild(fsReturn.node);\n    fsReturn = null;\n  }\n  function openFs(api) {\n    fsApi = api;\n    // Anchor overlay to the current viewport (robust even when an ancestor is\n    // transformed/scaled, which breaks position:fixed inside the editor).\n    fsOverlay.style.top = window.scrollY + 'px';\n    fsOverlay.style.height = window.innerHeight + 'px';\n    mountActiveFrame();\n    fsOverlay.classList.add('open');\n    document.body.style.overflow = 'hidden';\n    if (fsOverlay.requestFullscreen) fsOverlay.requestFullscreen().catch(() => {});\n  }\n  function fsGo(dir) {\n    if (!fsApi) return;\n    restoreFrame();\n    fsApi.navigate(dir);\n    mountActiveFrame();\n  }\n  function closeFs() {\n    restoreFrame();\n    fsApi = null;\n    fsOverlay.classList.remove('open');\n    document.body.style.overflow = '';\n    if (document.fullscreenElement) document.exitFullscreen().catch(() => {});\n  }\n  fsPrev.addEventListener('click', () => fsGo(-1));\n  fsNext.addEventListener('click', () => fsGo(1));\n  document.getElementById('fsClose').addEventListener('click', closeFs);\n  document.addEventListener('keydown', e => {\n    if (!fsOverlay.classList.contains('open')) return;\n    if (e.key === 'Escape') closeFs();\n    else if (e.key === 'ArrowLeft') fsGo(-1);\n    else if (e.key === 'ArrowRight') fsGo(1);\n  });\n  document.addEventListener('fullscreenchange', () => { if (!document.fullscreenElement && fsOverlay.classList.contains('open')) closeFs(); });\n\n  document.querySelectorAll('[data-carousel]').forEach(car => {\n    const total = +car.dataset.total;\n    const slides = car.querySelectorAll('.c-slide');\n    const prev = car.querySelector('[data-role=\"prev\"]');\n    const next = car.querySelector('[data-role=\"next\"]');\n    const cur = car.querySelector('[data-role=\"cur\"]');\n    const titleEl = car.querySelector('[data-role=\"title\"]');\n    const dotsWrap = car.querySelector('[data-role=\"dots\"]');\n    // add full-screen button to the top bar\n    const topbar = car.querySelector('.c-topbar');\n    const controls = document.createElement('div');\n    controls.className = 'c-controls';\n    const countEl = car.querySelector('.c-count');\n    const fsBtn = document.createElement('button');\n    fsBtn.className = 'c-fs-btn';\n    fsBtn.innerHTML = '⛶ Full screen';\n    controls.appendChild(countEl);\n    controls.appendChild(fsBtn);\n    topbar.appendChild(controls);\n    let idx = 0;\n    // build dots\n    for (let i = 0; i < total; i++) {\n      const d = document.createElement('span');\n      d.className = 'dot' + (i === 0 ? ' active' : '');\n      d.addEventListener('click', () => { idx = i; render(); });\n      dotsWrap.appendChild(d);\n    }\n    const dots = dotsWrap.querySelectorAll('.dot');\n    function render() {\n      slides.forEach(s => s.classList.toggle('active', +s.dataset.i === idx));\n      dots.forEach((d, i) => d.classList.toggle('active', i === idx));\n      cur.textContent = idx + 1;\n      titleEl.textContent = slides[idx].dataset.title;\n      if (prev) prev.disabled = idx === 0;\n      if (next) next.disabled = idx === total - 1;\n    }\n    if (prev) prev.addEventListener('click', () => { idx = Math.max(0, idx - 1); render(); });\n    if (next) next.addEventListener('click', () => { idx = Math.min(total - 1, idx + 1); render(); });\n    const api = {\n      total,\n      getIdx: () => idx,\n      getTitle: () => slides[idx].dataset.title,\n      getActiveFrame: () => slides[idx].querySelector('.frame'),\n      navigate: (dir) => { idx = Math.max(0, Math.min(total - 1, idx + dir)); render(); }\n    };\n    fsBtn.addEventListener('click', () => openFs(api));\n    render();\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
